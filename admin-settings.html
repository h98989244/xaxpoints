<!DOCTYPE html>

<html class="dark" lang="zh-Hant"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#256af4",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "Noto Sans TC", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 py-4 md:px-10 lg:px-40 bg-white dark:bg-background-dark sticky top-0 z-50">
<div class="flex items-center gap-4">
<div class="flex items-center justify-center p-2 rounded-lg bg-primary text-white">
<span class="material-symbols-outlined">settings</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">網站管理後台</h2>
</div>
<div class="flex items-center gap-3">
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-xl">notifications</span>
</button>
<div class="h-8 w-8 rounded-full bg-primary flex items-center justify-center text-white font-bold text-xs">AD</div>
</div>
</header>
<main class="flex flex-1 flex-col md:flex-row px-4 md:px-10 lg:px-40 py-8 gap-8">
<aside class="w-full md:w-64 flex flex-col gap-2 shrink-0">
<div class="mb-4">
<h3 class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">主要導覽</h3>
</div>
<nav class="flex flex-col gap-1">
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/10 text-primary font-medium" href="#">
<span class="material-symbols-outlined">info</span>
<span class="text-sm">一般資訊</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="#">
<span class="material-symbols-outlined">manage_accounts</span>
<span class="text-sm">權限管理</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="#">
<span class="material-symbols-outlined">notifications_active</span>
<span class="text-sm">通知設定</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="#">
<span class="material-symbols-outlined">security</span>
<span class="text-sm">安全中心</span>
</a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" href="#">
<span class="material-symbols-outlined">history</span>
<span class="text-sm">操作日誌</span>
</a>
</nav>
</aside>
<section class="flex-1 max-w-3xl">
<div class="mb-8">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold mb-2">一般資訊設定</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">管理您的網站基本資料與對外聯絡資訊</p>
</div>
<div class="space-y-8">
<div class="bg-white dark:bg-slate-900/50 p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-6 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">store</span>
                            基本資料
                        </h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">網站名稱</label>
<input class="form-input w-full rounded-lg border-slate-300 dark:border-slate-700 bg-transparent focus:border-primary focus:ring-1 focus:ring-primary dark:text-white" placeholder="輸入網站名稱" type="text" value="我的品牌電商"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">統一編號 (Tax ID)</label>
<input class="form-input w-full rounded-lg border-slate-300 dark:border-slate-700 bg-transparent focus:border-primary focus:ring-1 focus:ring-primary dark:text-white" placeholder="8位數字" type="text" value="88888888"/>
</div>
</div>
<div class="mt-6 flex flex-col gap-4">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">網站標誌 (Logo)</label>
<div class="flex items-center gap-6 p-4 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800/30">
<div class="w-16 h-16 rounded-lg bg-white dark:bg-slate-800 flex items-center justify-center overflow-hidden border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined text-3xl text-slate-400">image</span>
</div>
<div class="flex flex-col gap-1">
<div class="flex gap-2">
<button class="bg-primary text-white text-xs font-bold px-3 py-2 rounded-lg hover:bg-primary/90 transition-colors">上傳圖片</button>
<button class="bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs font-bold px-3 py-2 rounded-lg hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors">移除</button>
</div>
<p class="text-xs text-slate-500 dark:text-slate-400">建議尺寸: 512x512px, 支援 PNG, SVG</p>
</div>
</div>
</div>
</div>
<div class="bg-white dark:bg-slate-900/50 p-6 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold mb-6 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">contact_support</span>
                            聯絡資訊
                        </h3>
<div class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">通訊地址</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">location_on</span>
<input class="form-input w-full pl-10 rounded-lg border-slate-300 dark:border-slate-700 bg-transparent focus:border-primary focus:ring-1 focus:ring-primary dark:text-white" type="text" value="台北市信義區信義路五段7號"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">聯絡電話</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">call</span>
<input class="form-input w-full pl-10 rounded-lg border-slate-300 dark:border-slate-700 bg-transparent focus:border-primary focus:ring-1 focus:ring-primary dark:text-white" type="tel" value="02-1234-5678"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">電子郵件</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="form-input w-full pl-10 rounded-lg border-slate-300 dark:border-slate-700 bg-transparent focus:border-primary focus:ring-1 focus:ring-primary dark:text-white" type="email" value="service@example.com"/>
</div>
</div>
</div>
</div>
</div>
<div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-200 dark:border-slate-800">
<button class="px-6 py-3 rounded-lg border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 font-bold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                            取消
                        </button>
<button class="px-10 py-3 rounded-lg bg-primary text-white font-bold hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-lg">save</span>
                            儲存變更
                        </button>
</div>
</div>
</section>
</main>
<footer class="mt-auto px-10 lg:px-40 py-6 border-t border-slate-200 dark:border-slate-800 text-center">
<p class="text-slate-500 dark:text-slate-500 text-xs">© 2024 網站管理後台系統. 版權所有.</p>
</footer>
</div>
</div>
</body></html>
