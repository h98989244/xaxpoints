version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@latest --activate
        - pnpm install --frozen-lockfile
        - env >> .env
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next # Or 'dist' / 'build' depending on your framework
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*